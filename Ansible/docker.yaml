- name: Docker build and push
  hosts: local
  become: yes

  vars:
    dockerhub_username: savanchukpavlo
    dockerhub_image: petstore
    dockerhub_tag: latest
    dockerhub_password: "{{ lookup('env', 'DOCKER_HUB_PASSWORD') }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Remove containerd conflict
      apt:
        name: containerd
        state: absent
      ignore_errors: yes

    - name: Install Docker via official script
      shell: |
        curl -fsSL https://get.docker.com -o get-docker.sh
        sh get-docker.sh
      args:
        creates: /usr/bin/docker

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Restart Docker service
      service:
        name: docker
        state: restarted

    - name: Clone project
      git:
        repo: https://github.com/Pavlo-1992/jpetstore-6
        dest: /home/ubuntu/petstore
        version: master
        force: yes

    - name: Login to Docker Hub
      community.docker.docker_login:
        registry_url: https://index.docker.io/v1/
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"

    - name: Build and push Docker image
      community.docker.docker_image:
        name: "{{ dockerhub_username }}/{{ dockerhub_image }}"
        tag: "{{ dockerhub_tag }}"
        source: build
        build:
          path: /home/ubuntu/petstore
        push: true

    - name: Remove old container
      community.docker.docker_container:
        name: pet1
        state: absent
      ignore_errors: yes

    - name: Run new container
      community.docker.docker_container:
        name: pet1
        image: "{{ dockerhub_username }}/{{ dockerhub_image }}:{{ dockerhub_tag }}"
        state: started
        restart_policy: always
        ports:
          - "8081:8080"
